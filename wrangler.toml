name = "woah"
main = "src/worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Public hostname. Cloudflare attaches the domain to this Worker on deploy,
# auto-creates the DNS record, and provisions a TLS certificate. Requires
# the `generalbusiness.ai` zone to be on the same Cloudflare account as
# this Worker. The workers.dev URL (woah.inguz.workers.dev) continues to
# serve in parallel for canary/internal use — `workers_dev = true` is
# required because wrangler's implicit default flips to `false` once any
# `routes` are declared.
workers_dev = true
routes = [
  { pattern = "woah.generalbusiness.ai", custom_domain = true },
  { pattern = "woah1.generalbusiness.ai", custom_domain = true }
]

[observability]
enabled = true
head_sampling_rate = 1.0

[vars]
# Cloudflare deploys auto-install the bundled local catalogs listed here
# at first-light bootstrap (empty storage). The list runs once and the
# resulting bundle is persisted forever; flipping this variable on an
# existing deploy does not remove already-installed catalogs.
#
# The shipped default is the full demo bundle so that a fresh fork-and-
# deploy lands a populated world matching woah1.generalbusiness.ai. For
# faster first-light on operator deployments that don't want the demo
# content, use the foundational-only subset — classes only, no bundled
# instances; first-light cost drops from a few seconds to tens of ms:
#   WOO_AUTO_INSTALL_CATALOGS = "chat,help,note,prog"
# For an entirely clean core world (no auto-install), set the empty
# string. See DEPLOY.md §WOO_AUTO_INSTALL_CATALOGS for details.
WOO_AUTO_INSTALL_CATALOGS = "chat,demoworld,dubspace,help,note,pinboard,prog,tasks,blocks-demo"

# Which AE dataset /admin/series queries. Must match the
# `[[analytics_engine_datasets]].dataset` for the active env. Set
# CF_ACCOUNT_ID here too so the admin handler knows the SQL API target;
# CF_ANALYTICS_TOKEN and ADMIN_PASSWORD are secrets, set via
# `wrangler secret put`.
WOO_AE_DATASET = "woo_v1_prod"
CF_ACCOUNT_ID = "6e953d231f1c9aadffbf59537a82e13a"

# Thin envelope: send MCP /v2/envelope turns WITHOUT the ~3MB authority slice.
# The CommitScopeDO rehydrates from its durable snapshot; a truly-cold scope
# replies E_SNAPSHOT_REQUIRED and the gateway reseeds + retries with the full
# body. Stale foreign cells converge through the existing read-version-mismatch
# repair loop. Flag-gated so it can be flipped off instantly if a regression
# appears. The v2_envelope.request_bytes size proxy verifies the warm-turn drop
# from MB-scale to KB-scale.
WOO_V2_SLIM_WARM_ENVELOPE = "1"
# B-ii: serve cold-owner authority from HOST_SEED_KV instead of a live cross-DO
# authority-slice RPC. The KV checkpoint is available in ~10-50ms vs ~5s cold-
# start penalty. Disabled in the fake-DO test lane (WOO_V2_KV_SEED_AUTHORITY must
# NOT be set there) because the lane is microtask-ordering-sensitive.
WOO_V2_KV_SEED_AUTHORITY = "1"
# B-i: planned-transcript (cross-scope) envelopes carry only the turn's read
# closure instead of the scope-wide authority slice (VTN8.3). Validated by the
# corpus/lane parity gates and the <256KB enforced byte ceiling; verdict
# equivalence is proven, not assumed. Flag-off restores full slices instantly.
WOO_V2_READ_CLOSURE_ENVELOPE = "1"
# D1: peer fanout moves off the caller's commit-reply path into the durable
# v2_fanout_pending outbox (VTN9.1): reply after durable save, drain after
# reply, drain-on-reactivation covers the crash window, bounded backoff with
# fanout_redelivery metrics. Flag-off restores synchronous post-accept delivery.
WOO_V2_TAIL_DELIVERY = "1"
# B-iv: gate per-commit checkpoint builds on a frame interval rather than
# running on EVERY accepted commit (B-iv default). Production CommitScopeDOs
# reconstruct on essentially every turn, so the gate reads the PERSISTED
# checkpoint seq (not in-memory) to survive reconstruction. Intervening frames
# are covered by the durable accepted-frame tail. The first commit after a cold
# activation always checkpoints (seq=unknown), bounding worst-case cold replay
# to one interval.
# Interval 32 was chosen because: (a) the default "checkpoint every commit"
# rebuilt the ~3MB checkpoint on ~every CF turn, accounting for an estimated
# 10-15% of CommitScopeDO cpuTime; (b) 32 frames bounds worst-case tail-only
# replay to a small, bounded window; (c) for a normal room at 1 turn/s the
# checkpoint runs once every ~32 seconds, well within the DO's idle eviction
# window, so the persisted floor is fresh and cold-replay cost is bounded.
# Set WOO_V2_CHECKPOINT_FRAME_INTERVAL=1000000 to measure the CPU floor
# (effectively never checkpoint on commit); the default 32 is the shipped value.
WOO_V2_CHECKPOINT_BOUNDED = "1"
WOO_V2_CHECKPOINT_FRAME_INTERVAL = "32"

# Static assets: the bundled SPA is built to dist/ via `npm run build`.
# The Worker entry routes global API/WS traffic to the gateway DO and object
# REST routes through Directory; everything else falls through to ASSETS.fetch.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Force the Worker to run before static-asset routing for every
# request. With `not_found_handling = single-page-application`,
# Cloudflare's SPA fallback serves `index.html` for any path that
# doesn't match a literal asset — which silently swallows our API
# surfaces (/healthz, /mcp, /v2/*, /api/*, /admin/*) the moment the
# edge cache warms a SPA-shell response for them. Symptoms include
# /mcp POST returning 405 (static routes only accept GET) and
# /healthz returning the SPA HTML. The Worker entry already calls
# env.ASSETS.fetch explicitly for non-API paths, so making the Worker
# authoritative for all routes preserves SPA serving while keeping
# API routes reachable.
run_worker_first = true

[[durable_objects.bindings]]
name = "WOO"
class_name = "PersistentObjectDO"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

[[durable_objects.bindings]]
name = "COMMIT_SCOPE"
class_name = "CommitScopeDO"

# KV-fronted host-seed cache. WORLD writes (host, digest, seed_bytes)
# tuples on every host-seed build; cold satellites read from KV via a
# Worker route before falling back to WORLD's DO. Per-region cached at
# the edge, eventual-consistency on writes — fine for host-seed delivery
# because seeds are coupled to the digest the satellite already stores.
# See notes/2026-05-21-host-seed-kv.md (forthcoming).
[[kv_namespaces]]
binding = "HOST_SEED_KV"
id = "450f0affacf44f8ca3ae03add832eeb8"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistentObjectDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DirectoryDO"]

[[migrations]]
tag = "cf-do-0006"
new_sqlite_classes = [ "CommitScopeDO" ]

# Workers Analytics Engine dataset for the admin stats panel
# (notes/2026-05-17-admin-stats.md, spec/reference/cloudflare.md §R10.1).
# Binding name `METRICS` matches the spec. One dataset per env so prod and
# staging get independent 100k/day quotas; both share the binding name so
# worker code is env-agnostic. The sink writes host_key as the single index
# field; AE's adaptive sampling boundary then matches the dashboard's
# primary pivot.
[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "woo_v1_prod"

# Optional staging slot. Uncomment, rename to taste, and deploy with:
#   wrangler deploy --env staging
# The staging worker gets its own DO storage namespace; cost is per-request
# + DO storage proportional to staging data (idle stagings are near-zero).
# See DEPLOY.md "Pre-deploy testing" for usage.
#
# [env.staging]
# name = "woah-staging"
#
# [[env.staging.durable_objects.bindings]]
# name = "WOO"
# class_name = "PersistentObjectDO"
#
# [[env.staging.durable_objects.bindings]]
# name = "DIRECTORY"
# class_name = "DirectoryDO"
#
# [[env.staging.durable_objects.bindings]]
# name = "COMMIT_SCOPE"
# class_name = "CommitScopeDO"
#
# [env.staging.assets]
# directory = "./dist"
# binding = "ASSETS"
# not_found_handling = "single-page-application"
#
# [env.staging.vars]
# # Inherits the production default (full demo). Override here to run
# # foundational-only or a custom bundle in staging:
# # WOO_AUTO_INSTALL_CATALOGS = "chat,help,note,prog"
# # WOO_AUTO_INSTALL_CATALOGS = "chat,demoworld,dubspace,help,note,pinboard,prog,tasks,blocks-demo"
# WOO_AE_DATASET = "woo_v1_staging"
#
# [[env.staging.analytics_engine_datasets]]
# binding = "METRICS"
# dataset = "woo_v1_staging"
