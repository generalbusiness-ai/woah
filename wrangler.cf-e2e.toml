# CF e2e Playwright lane — wrangler config for the browser-against-workerd lane.
# (scripts/e2e-cf-dev.ts, `npm run e2e:cf`).
#
# Extends wrangler.smoke.toml with one addition: an [assets] block that serves
# the pre-built SPA from ./dist so the browser can load the client.  The smoke
# config deliberately omits [assets] because MCP/REST smoke hits only /healthz
# and /mcp; the browser lane needs the full SPA load path.
#
# The client's WS URL is derived from window.location.host (see
# src/client/v2-browser-url.ts), so serving the SPA from the same wrangler-dev
# origin makes the browser's WS upgrade land on the real workerd process — no
# proxy or CORS required.
#
# Intentional differences from wrangler.toml / wrangler.smoke.toml:
#   - name="woah-cf-e2e" — isolated DO storage, never collides with smoke or prod
#   - [assets] directory="./dist" added (built by `npm run build` before the lane)
#   - no Analytics Engine binding (AE writes are deploy-only telemetry)
#   - secrets inlined as [vars] (safe non-secret local dev values)
#   - workers_dev=false (local only, no public access)
#
# DO bindings + migrations MUST stay in lockstep with wrangler.toml and
# wrangler.smoke.toml (enforced by guard:smoke-wrangler, which also checks this
# file — see scripts/guard-smoke-wrangler.mjs).
name = "woah-cf-e2e"
main = "src/worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = false

[vars]
# Same demo bundle as wrangler.smoke.toml so the world matches.
WOO_AUTO_INSTALL_CATALOGS = "chat,demoworld,dubspace,help,note,pinboard,prog,tasks,blocks-demo"
WOO_V2_SLIM_WARM_ENVELOPE = "1"
# Behavior flags mirror production wrangler.toml (enforced by
# guard:smoke-wrangler WOO_* parity): the browser e2e lane must exercise the
# same envelope/fanout/cold-read paths the deployed worker runs.
WOO_V2_KV_SEED_AUTHORITY = "1"
WOO_V2_READ_CLOSURE_ENVELOPE = "1"
WOO_V2_TAIL_DELIVERY = "1"
# D2a: serve MCP fanout-audience session reads from the gateway shard's local
# projection cache (sequence-current rows maintained by fanout) instead of a
# per-turn Directory RPC; Directory remains the cold/first-touch fallback and
# the authority-reconstruction path intentionally still uses it.
WOO_V2_D2_SESSION_FROM_PROJECTION = "1"
# B-iv: bounded checkpoints — see wrangler.toml for rationale.
# Must match production to satisfy guard:smoke-wrangler WOO_* parity.
WOO_V2_CHECKPOINT_BOUNDED = "1"
WOO_V2_CHECKPOINT_FRAME_INTERVAL = "32"
# Local-only, non-secret defaults.
WOO_INITIAL_WIZARD_TOKEN = "local-cf-e2e-wizard-token"
WOO_INTERNAL_SECRET = "local-cf-e2e-internal-secret"

# The browser e2e lane enables browser-profile receiver_profile so the
# CF path exercises optimistic execution.  Off by default in smoke lanes
# (the flag is the subject of D3a wave-3 validation).
# WOO_BROWSER_PROJECTION_HOLDER = "1"

# Static assets: the pre-built SPA bundle.  The Worker entry routes API/WS
# traffic first (run_worker_first = true) so API and WebSocket paths are not
# swallowed by the SPA fallback.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[durable_objects.bindings]]
name = "WOO"
class_name = "PersistentObjectDO"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

[[durable_objects.bindings]]
name = "COMMIT_SCOPE"
class_name = "CommitScopeDO"

[[kv_namespaces]]
binding = "HOST_SEED_KV"
id = "local_cf_e2e_host_seed_kv"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistentObjectDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DirectoryDO"]

[[migrations]]
tag = "cf-do-0006"
new_sqlite_classes = ["CommitScopeDO"]
