name = "woo-horoscope-plug"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Drain the queue every 15 minutes. Each plug tick wakes WORLD via
# /api/objects/the_horoscope/calls/next_pending and pinned its host
# queue for 19-26 s of v2-relay setup (see
# notes/2026-05-22-horoscope-blocking-world.md). Minute-cadence polling
# was using ~30% of WORLD's wall time on overhead alone for a queue
# that's empty most of the time. 15-minute polling is plenty for a
# demo block; the :order verb can still emit a directed `text` wakeup
# for synchronous response.
[triggers]
crons = ["*/15 * * * *"]

# Workers AI binding. Free-tier daily-neuron quota covers the demo easily.
[ai]
binding = "AI"

# Required environment variables (set via `wrangler secret put` for secrets):
#   WOO_BASE_URL          - e.g. https://woo.example.com
#   WOO_APIKEY            - secret. apikey:<id>:<secret> minted via :mint_apikey
#   BLOCK_ID              - canonical block id, e.g. the_horoscope_block
#   MAX_TOKENS            - optional, defaults to 350
#   MAX_ORDERS_PER_TICK   - optional, defaults to 10
#   SYSTEM_PROMPT_TTL_MS   - optional, defaults to 300000
#   HEARTBEAT_INTERVAL_MS  - optional, defaults to 300000
#
# Provisioning:
#   wrangler secret put WOO_APIKEY
#   wrangler deploy
[vars]
# Public routing/config values. Secrets still go through `wrangler secret put`.
WOO_BASE_URL = "https://woah.generalbusiness.ai"
BLOCK_ID = "the_horoscope"
MAX_TOKENS = "350"
MAX_ORDERS_PER_TICK = "10"
SYSTEM_PROMPT_TTL_MS = "300000"
HEARTBEAT_INTERVAL_MS = "300000"
