# Smoke-only Wrangler config for the local workerd smoke lane
# (scripts/smoke-cf-dev.ts, `npm run smoke:cf-dev`).
#
# This boots the REAL worker entry in REAL workerd via `wrangler dev --local`,
# with REAL per-Durable-Object storage and REAL cross-DO RPC — the distributed
# substrate surface the in-process fake (tests/worker/fake-do.ts) cannot model.
# It is the lane between the fast in-process fake (`smoke:cf-local`) and the
# paid Cloudflare deploy smoke (`scripts/smoke-walkthrough.ts`).
#
# Differences from the production wrangler.toml, all deliberate:
#   - distinct `name` ("woah-smoke") so local DO storage never collides with a
#     real deploy's namespaces;
#   - no `routes` / no custom domains (local only);
#   - no `[assets]` block — the smoke only hits /healthz and /mcp, never static
#     assets, so we skip the `dist/` build entirely (the fake Env proves the
#     worker boots without ASSETS/METRICS bindings);
#   - no Analytics Engine binding — AE writes are deploy-only telemetry;
#   - secrets are inlined as local-only `[vars]` (safe non-secret dev values),
#     so the lane needs no `.dev.vars` file.
#
# Everything that matters for the walkthrough — the three Durable Object
# classes, their sqlite migrations, the KV host-seed binding, and the
# auto-installed demo world — matches production.
name = "woah-smoke"
main = "src/worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = false

[vars]
# Same demo bundle as production so the local world matches woah1: the
# walkthrough needs the_chatroom (chat), the_deck/the_garden (demoworld),
# the_pinboard (pinboard), the_outline (outliner via dubspace), the_taskboard
# (tasks), the_mug (demoworld), and note support.
WOO_AUTO_INSTALL_CATALOGS = "chat,demoworld,dubspace,help,note,pinboard,prog,tasks,blocks-demo"
WOO_V2_SLIM_WARM_ENVELOPE = "1"
# B-ii: serve cold-owner authority from HOST_SEED_KV checkpoint. Enabled in the
# workerd smoke lane (real DO storage/RPC). NOT in the fake-DO lane (fake-do.ts).
WOO_V2_KV_SEED_AUTHORITY = "1"
# B-i: enable read-closure envelopes for planned-transcript (cross-scope) commits.
# Test lane only — not set in production wrangler.toml.
WOO_V2_READ_CLOSURE_ENVELOPE = "1"
# Local-only, non-secret defaults (mirror .dev.vars.example). Production sets
# these via `wrangler secret put`; locally they are just config.
WOO_INITIAL_WIZARD_TOKEN = "local-smoke-wizard-token"
WOO_INTERNAL_SECRET = "local-smoke-internal-secret"
# D1: tail-driven post-reply delivery. Writes v2_fanout_pending rows
# before reply and drains them after, so crash recovery re-delivers
# rather than drops. Safe to enable in the smoke lane.
WOO_V2_TAIL_DELIVERY = "1"
# D2a: serve MCP fanout-audience session reads from the gateway shard's local
# projection cache (sequence-current rows maintained by fanout) instead of a
# per-turn Directory RPC; Directory remains the cold/first-touch fallback and
# the authority-reconstruction path intentionally still uses it.
WOO_V2_D2_SESSION_FROM_PROJECTION = "1"
# B-iv: bounded checkpoints — see wrangler.toml for rationale.
# Must match production to satisfy guard:smoke-wrangler WOO_* parity.
WOO_V2_CHECKPOINT_BOUNDED = "1"
WOO_V2_CHECKPOINT_FRAME_INTERVAL = "32"
# C1a fault injection — NEVER set in production. Opt-in per test run by
# un-commenting and editing the value. See src/worker/rpc-fault-inject.ts
# for the FaultSpec format. Examples:
#
#   authority-slice timeout (B-ii gate: cold-owner degradation must be bounded):
#     WOO_FAULT_INJECT = '[{"route":"authority-slice","mode":"timeout"}]'
#
#   envelope latency (measure warm-turn cost floor without commit speed):
#     WOO_FAULT_INJECT = '[{"route":"envelope","mode":"latency","ms":200}]'
#
#   kill_after_commit nth=1 (D1 gate: peer convergence after crash-window):
#     WOO_FAULT_INJECT = '[{"route":"envelope","mode":"kill_after_commit","nth":1}]'
#
# WOO_FAULT_INJECT = ""

[[durable_objects.bindings]]
name = "WOO"
class_name = "PersistentObjectDO"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

[[durable_objects.bindings]]
name = "COMMIT_SCOPE"
class_name = "CommitScopeDO"

[[kv_namespaces]]
binding = "HOST_SEED_KV"
# id is ignored in local mode (wrangler dev --local uses a local KV store);
# kept non-empty so wrangler accepts the binding.
id = "local_smoke_host_seed_kv"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistentObjectDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DirectoryDO"]

[[migrations]]
tag = "cf-do-0006"
new_sqlite_classes = ["CommitScopeDO"]
